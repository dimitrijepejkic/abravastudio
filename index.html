<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABRAVA STUDIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <meta name="google-site-verification" content="0D7fX-FABBsAbKcizjknBjjTlo7DCY9p9ReYR4rPC20" />
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Background layers -->
    <div class="bg-layer bg-grid" id="bgGrid"></div>
    <div class="bg-layer bg-pixels" id="bgPixels"></div>
    <div class="bg-layer scanlines" id="bgScan"></div>

    <!-- Loading overlay -->
    <div id="loader" class="loader-wrap" aria-hidden="false">
        <div style="text-align:center;">
            <div class="badge">🚀 Website Under Construction</div>
            <div class="loading-text">LOADING ASSETS</div>
        </div>

        <div class="loading-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="progress" class="loading-progress">
                <div class="shimmer"></div>
            </div>
        </div>

        <div class="loading-text" id="percent">0%</div>
    </div>


    <!-- Main content -->
    <main class="container" id="mainContent"
        style="opacity:0;transform:translateY(8px);transition:opacity .6s ease,transform .6s ease;">
        <div class="badge">🚀 Website Under Construction</div>

        <h1 class="logo" id="logo">
            <span class="a-green">A</span><span class="brava">BRAVA</span>
            <span class="studio">STUDIO</span>
        </h1>

        <p class="lead">
            We're currently building something awesome.
            Our website is under development and will be launching soon.
            Stay tuned for updates.
        </p>

        <!-- Larger mini loader (no pixel sprite, no underline) -->
        <div class="pixel-block" id="pixelBlock">
            <div class="mini-loader large" role="status" aria-label="Asset progress">
                <div class="mini-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                    <div class="mini-fill" aria-hidden="true"></div>
                    <div class="mini-shimmer" aria-hidden="true"></div>
                </div>
                <div class="mini-percent" aria-live="polite">0%</div>
            </div>
        </div>

        <div class="contact">
            Contact:
            <a href="mailto:contact@abravastudio.com">contact@abravastudio.com</a>
        </div>
        <label for="email" class="newsletter-label">
            Subscribe to our newsletter:
        </label>
        <form id="newsletterForm" novalidate>

            <div class="newsletter-row">
                <input type="email" id="email" name="email" placeholder="Email" autocomplete="email" maxlength="254"
                    required>
                <button type="submit" class="newsletter-button">
                    Subscribe
                </button>
            </div>

            <small id="emailError" class="error-message"></small>
        </form>


        <div class="discord-section">
            <a href="https://discord.gg/Pe43a2wpKr" target="_blank" class="discord-link">
                <span class="discord-icon"> <img src="images/discord-round-color-icon.webp" alt="Discord" /></span>
                <span class="discord-text">Join our Discord server</span>
            </a>
        </div>


    </main>

    <script src="js/main.js"></script>
</body>

</html>
